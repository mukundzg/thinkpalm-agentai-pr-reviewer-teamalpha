services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pr-review-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./.chroma:/app/.chroma
      - ./.chroma-cache:/root/.cache/chroma

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
    container_name: pr-review-frontend
    depends_on:
      - backend
    ports:
      - "4173:4173"
